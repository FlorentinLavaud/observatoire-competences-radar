version: "3.9"

services:
  dagster:
    build: .
    container_name: radar_dagster
    restart: always
    ports:
      - "3000:3000"
    environment:
      - FRANCE_TRAVAIL_CLIENT_ID=${FRANCE_TRAVAIL_CLIENT_ID}
      - FRANCE_TRAVAIL_SECRET_KEY=${FRANCE_TRAVAIL_SECRET_KEY}
    volumes:
      - ./dbt_project:/workspace/dbt_project
      - ./data:/workspace/data
    command: dagit -h 0.0.0.0 -p 3000 -w dagster/repository.py